<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark" id="html-root">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Адмінка{% endblock %} — Car Pool Best</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --sb-bg: #1a1d27; --sb-border: #252836; --bg: #0f1117;
      --text: #e8eaf0;  --muted: #6b7280;    --nav-hover: #252836;
      --nav-active-bg: #1e2d4a; --nav-active: #6c8ef7;
      --card-bg: #1a1d27; --input-bg: #13151f;
    }
    [data-bs-theme="light"] {
      --sb-bg: #f0f2f9; --sb-border: #d9dce8; --bg: #e8eaf3;
      --text: #1a1d27;  --muted: #6b7280;    --nav-hover: #dde0f0;
      --nav-active-bg: #d4dcff; --nav-active: #3b5bdb;
      --card-bg: #ffffff; --input-bg: #ffffff;
    }
    body  { font-size: 13.5px; background: var(--bg); color: var(--text); }
    .sidebar { width: 215px; min-height: 100vh; background: var(--sb-bg); border-right: 1px solid var(--sb-border); flex-shrink: 0; }
    .sidebar-logo { padding: 16px 18px 14px; border-bottom: 1px solid var(--sb-border); }
    .sidebar-logo .name { font-weight: 700; font-size: 15px; color: var(--text); }
    .sidebar-logo .sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .nav-link { color: var(--muted); padding: 7px 14px; border-radius: 7px; margin: 2px 8px; font-size: 13px; }
    .nav-link:hover { background: var(--nav-hover); color: var(--text); }
    .nav-link.active { background: var(--nav-active-bg); color: var(--nav-active); }
    .nav-icon { width: 20px; display: inline-block; text-align: center; margin-right: 6px; }
    .nav-sep  { height: 1px; background: var(--sb-border); margin: 6px 16px; }
    .content-area { flex: 1; overflow-y: auto; padding: 24px; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--sb-border); border-radius: 10px; padding: 18px 20px; }
    .stat-val  { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-lbl  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .table { color: var(--text); }
    .table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; border-color: var(--sb-border); }
    .table td { border-color: var(--sb-border); vertical-align: middle; }
    .table > :not(caption) > * > * { background: transparent; }
    .table-hover > tbody > tr:hover > * { background-color: var(--nav-hover); }
    .card { background: var(--card-bg); border: 1px solid var(--sb-border); border-radius: 10px; }
    .card-header { background: transparent; border-bottom: 1px solid var(--sb-border); padding: 12px 16px; font-weight: 600; font-size: 13px; color: var(--muted); }
    .form-control, .form-select { background: var(--input-bg); border-color: var(--sb-border); color: var(--text); font-size: 13px; }
    .form-control:focus, .form-select:focus { background: var(--input-bg); border-color: #4c6ef5; color: var(--text); box-shadow: 0 0 0 2px #4c6ef520; }
    .btn-primary { background: #3b5bdb; border-color: #3b5bdb; }
    .btn-primary:hover { background: #4c6ef5; border-color: #4c6ef5; }
    .badge-active    { background: #1e3a2a; color: #4ade80; border: 1px solid #2d5a3a; font-weight: 500; }
    .badge-confirmed { background: #1e2d4a; color: #6c8ef7; border: 1px solid #2d4a7a; font-weight: 500; }
    .badge-cancelled { background: #3a1e1e; color: #f87171; border: 1px solid #7f1d1d; font-weight: 500; }
    .badge-closed    { background: #1e1e1e; color: #6b7280; border: 1px solid #374151; font-weight: 500; }
    .badge-matching  { background: #2a2a1a; color: #fbbf24; border: 1px solid #6a5a1a; font-weight: 500; }
    .badge-driver    { background: #1e2d4a; color: #6c8ef7; border: 1px solid #2d4a7a; font-weight: 500; }
    .badge-passenger { background: #2a1e3a; color: #c084fc; border: 1px solid #5a2d7a; font-weight: 500; }
    input::placeholder, textarea::placeholder { color: #4b5563 !important; }
    #theme-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 0; color: var(--muted); }
    #theme-btn:hover { color: var(--text); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="d-flex">
  <div class="sidebar d-flex flex-column">
    <div class="sidebar-logo d-flex align-items-center justify-content-between">
      <div>
        <div class="name">🚗 Car Pool Best</div>
        <div class="sub">Admin Panel</div>
      </div>
      <button id="theme-btn" title="Змінити тему">🌙</button>
    </div>
    <nav class="nav flex-column py-2 gap-0">
      <a href="/admin/"             class="nav-link {% if active == 'dashboard' %}active{% endif %}"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/admin/trips"        class="nav-link {% if active == 'trips'     %}active{% endif %}"><span class="nav-icon">🚗</span> Поїздки</a>
      <a href="/admin/users"        class="nav-link {% if active == 'users'     %}active{% endif %}"><span class="nav-icon">👥</span> Користувачі</a>
      <a href="/admin/matches"      class="nav-link {% if active == 'matches'   %}active{% endif %}"><span class="nav-icon">🤝</span> Матчі</a>
      <div class="nav-sep"></div>
      <a href="/admin/broadcast"    class="nav-link {% if active == 'broadcast' %}active{% endif %}"><span class="nav-icon">📢</span> Розсилка</a>
      <a href="/admin/manual-match" class="nav-link {% if active == 'manual-match' %}active{% endif %}"><span class="nav-icon">🔗</span> Матч вручну</a>
      <a href="/admin/safety"       class="nav-link {% if active == 'safety'    %}active{% endif %}"><span class="nav-icon">🛡</span> Безпека</a>
      <div class="nav-sep"></div>
      <a href="/admin/workflow"     class="nav-link {% if active == 'workflow'  %}active{% endif %}"><span class="nav-icon">🔀</span> Воркфлоу</a>
      <a href="/admin/tickets"      class="nav-link {% if active == 'tickets'   %}active{% endif %}"><span class="nav-icon">📩</span> Звернення</a>
      <a href="/admin/faq"          class="nav-link {% if active == 'faq'       %}active{% endif %}"><span class="nav-icon">❓</span> FAQ</a>
    </nav>
    <div class="mt-auto px-4 py-3" style="border-top:1px solid var(--sb-border)">
      <a href="/admin/logout" style="font-size:12px;color:var(--muted);text-decoration:none">↩️ Вийти</a>
    </div>
  </div>

  <div class="content-area">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function() {
      const root = document.getElementById('html-root');
      const btn  = document.getElementById('theme-btn');
      const saved = localStorage.getItem('adm_theme') || 'dark';
      root.setAttribute('data-bs-theme', saved);
      btn.textContent = saved === 'dark' ? '🌙' : '☀️';
      btn.addEventListener('click', () => {
        const next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-bs-theme', next);
        btn.textContent = next === 'dark' ? '🌙' : '☀️';
        localStorage.setItem('adm_theme', next);
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
