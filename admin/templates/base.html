<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Адмінка{% endblock %} — RideShare Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-size: 13.5px; background: #0f1117; }
    .sidebar { width: 210px; min-height: 100vh; background: #1a1d27; border-right: 1px solid #252836; flex-shrink: 0; }
    .sidebar-logo { padding: 16px 18px 14px; border-bottom: 1px solid #252836; }
    .sidebar-logo .name { font-weight: 700; font-size: 15px; color: #e8eaf0; }
    .sidebar-logo .sub  { font-size: 11px; color: #6b7280; margin-top: 1px; }
    .nav-link { color: #9ca3af; padding: 7px 14px; border-radius: 7px; margin: 2px 8px; font-size: 13px; }
    .nav-link:hover { background: #252836; color: #e8eaf0; }
    .nav-link.active { background: #1e2d4a; color: #6c8ef7; }
    .nav-icon { width: 20px; display: inline-block; text-align: center; margin-right: 6px; }
    .nav-sep { height: 1px; background: #252836; margin: 6px 16px; }
    .content-area { flex: 1; overflow-y: auto; padding: 24px; }
    .page-title { font-size: 20px; font-weight: 700; color: #e8eaf0; margin-bottom: 20px; }
    .stat-card { background: #1a1d27; border: 1px solid #252836; border-radius: 10px; padding: 18px 20px; }
    .stat-val  { font-size: 30px; font-weight: 700; color: #e8eaf0; line-height: 1; }
    .stat-lbl  { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .table { color: #d1d5db; }
    .table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; font-weight: 600; border-color: #252836; }
    .table td { border-color: #1e2330; vertical-align: middle; }
    .table > :not(caption) > * > * { background: transparent; }
    .table-hover > tbody > tr:hover > * { background-color: #1e2330; }
    .card { background: #1a1d27; border: 1px solid #252836; border-radius: 10px; }
    .card-header { background: transparent; border-bottom: 1px solid #252836; padding: 12px 16px; font-weight: 600; font-size: 13px; color: #9ca3af; }
    .form-control, .form-select { background: #13151f; border-color: #252836; color: #e8eaf0; font-size: 13px; }
    .form-control:focus, .form-select:focus { background: #13151f; border-color: #4c6ef5; color: #e8eaf0; box-shadow: 0 0 0 2px #4c6ef520; }
    .btn-primary { background: #3b5bdb; border-color: #3b5bdb; }
    .btn-primary:hover { background: #4c6ef5; border-color: #4c6ef5; }
    .badge-active    { background: #1e3a2a; color: #4ade80; border: 1px solid #2d5a3a; font-weight: 500; }
    .badge-confirmed { background: #1e2d4a; color: #6c8ef7; border: 1px solid #2d4a7a; font-weight: 500; }
    .badge-cancelled { background: #3a1e1e; color: #f87171; border: 1px solid #7f1d1d; font-weight: 500; }
    .badge-closed    { background: #1e1e1e; color: #6b7280; border: 1px solid #374151; font-weight: 500; }
    .badge-matching  { background: #2a2a1a; color: #fbbf24; border: 1px solid #6a5a1a; font-weight: 500; }
    .badge-driver    { background: #1e2d4a; color: #6c8ef7; border: 1px solid #2d4a7a; font-weight: 500; }
    .badge-passenger { background: #2a1e3a; color: #c084fc; border: 1px solid #5a2d7a; font-weight: 500; }
    input::placeholder, textarea::placeholder { color: #4b5563 !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="d-flex">
  <div class="sidebar d-flex flex-column">
    <div class="sidebar-logo">
      <div class="name">🚗 RideShare</div>
      <div class="sub">Admin Panel</div>
    </div>
    <nav class="nav flex-column py-2 gap-0">
      <a href="/admin/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="/admin/trips" class="nav-link {% if active == 'trips' %}active{% endif %}">
        <span class="nav-icon">🚗</span> Поїздки
      </a>
      <a href="/admin/users" class="nav-link {% if active == 'users' %}active{% endif %}">
        <span class="nav-icon">👥</span> Користувачі
      </a>
      <a href="/admin/matches" class="nav-link {% if active == 'matches' %}active{% endif %}">
        <span class="nav-icon">🤝</span> Матчі
      </a>
      <div class="nav-sep"></div>
      <a href="/admin/workflow" class="nav-link {% if active == 'workflow' %}active{% endif %}">
        <span class="nav-icon">🔗</span> Воркфлоу
      </a>
      <a href="/admin/tickets" class="nav-link {% if active == 'tickets' %}active{% endif %}">
        <span class="nav-icon">📩</span> Звернення
      </a>
      <a href="/admin/faq" class="nav-link {% if active == 'faq' %}active{% endif %}">
        <span class="nav-icon">❓</span> FAQ
      </a>
      <a href="/admin/settings" class="nav-link {% if active == 'settings' %}active{% endif %}">
        <span class="nav-icon">⚙️</span> Налаштування
      </a>
    </nav>
    <div class="mt-auto px-4 py-3" style="border-top:1px solid #252836">
      <a href="/admin/logout" style="font-size:12px;color:#6b7280;text-decoration:none">↩️ Вийти</a>
    </div>
  </div>

  <div class="content-area">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
