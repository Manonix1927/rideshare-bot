<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вхід — RideShare Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #1a1d27; border: 1px solid #252836; border-radius: 14px; padding: 36px 40px; width: 360px; }
    .form-control { background: #13151f; border-color: #252836; color: #e8eaf0; }
    .form-control:focus { background: #13151f; border-color: #4c6ef5; color: #e8eaf0; box-shadow: 0 0 0 2px #4c6ef520; }
    .btn-primary { background: #3b5bdb; border-color: #3b5bdb; width: 100%; padding: 10px; font-weight: 600; }
    .btn-primary:hover { background: #4c6ef5; border-color: #4c6ef5; }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:36px;margin-bottom:8px">🚗</div>
      <div style="font-size:20px;font-weight:700;color:#e8eaf0">RideShare Admin</div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px">Введіть токен для доступу</div>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:13px;border-radius:8px">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <div class="mb-3">
        <label class="form-label" style="font-size:12px;color:#9ca3af">ADMIN TOKEN</label>
        <input type="password" name="token" class="form-control" placeholder="••••••••••••" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary">Увійти</button>
    </form>
  </div>
</body>
</html>
